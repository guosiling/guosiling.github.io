params:
  title: "Siling Guo"
  description: Ph.D. Candidate in Education at UC Irvine
  # staticPath: ""  # The path to serve the static files from
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # color:
  #   textColor:
  #   secondaryTextColor:
  #   backgroundColor:
  #   secondaryBackgroundColor:
  #   primaryColor:
  #   secondaryColor:

  #   darkmode:
  #     textColor:
  #     secondaryTextColor:
  #     backgroundColor:
  #     secondaryBackgroundColor:
  #     primaryColor:
  #     secondaryColor:

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Siling Guo" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hello, my name is"
    title: "Siling Guo."
    subtitle: "I'm a Ph.D. candidate in the School of Education at the University of California, Irvine, specializing in Human Development in Context."
    content: "My research examines how cognitive and social-emotional skills interact and develop across childhood and adolescence, with a particular focus on mathematics learning and educational interventions."
    image: /images/hero.svg
    bottomImage:
      enable: false
    button:
      enable: true
      name: "CV"
      url: "https://drive.google.com/file/d/1whhf36wB0nThIsvkSXNb28rLa4MsAa2S/view?usp=sharing"
      download: false
      newPage: true
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-google-scholar
          url: https://scholar.google.com/citations?user=1JWqhlEAAAAJ&hl=en
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/siling-guo

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I am a Ph.D. candidate in the School of Education at the University of California, Irvine, specializing in Human Development in Context. My research examines how cognitive and social-emotional skills interact and develop across childhood and adolescence, with a particular focus on mathematics learning and educational interventions. I use longitudinal modeling, simulation methods, and randomized studies to understand developmental processes and evaluate how programs can support children's learning and well-being.
    skills:
      enable: true
      title: "Research Interests:"
      items:
        - "Child Development"
        - "Early Childhood Education"
        - "Mathematical Cognition"
        - "Math Motivation"
        - "Program Evaluation"
        - "Meta-Research"

  # Experience
  experience:
    enable: false
    items: []

  # Education
  education:
    enable: false
    items: []

  # Achievements - Publications
  achievements:
    enable: true
    items:
      - title: "Do Students Become More Likely to See Themselves as a \"Math Person\" or a \"Language Person\" Across K-12?"
        content: Wan, S., Tian, J., Guo, S., & Lauermann, F. (In Press). Child Development.
        url: https://doi.org/10.1111/cogs.70168
      - title: "Enhancing Flexible Transfer of Fractions"
        content: Begolli, K. N.*, Guo, S.*, Acevedo-Farag, L.M., et al. (2026). Cognitive Science.
        url: https://doi.org/10.1111/cogs.70168
      - title: "Buckets of Fun: Fraction Ball Activities"
        content: Guo, S., Bailey, D. H., Rhodes, K., et al. (2024). Journal of Applied Developmental Psychology.
        url: https://doi.org/10.1016/j.appdev.2024.101645
      - title: "Remote Co-teaching in Rural Classrooms"
        content: Guo, S., Sun, T., Gong, J., et al. (2022). CHI'22.
        url: https://doi.org/10.1145/3491102.3501924
      - title: "HoloBoard: A Large-format Immersive Teaching Board"
        content: Gong, J., Han, T., Guo, S., et al. (2021). UIST'21.
        url: https://doi.org/10.1145/3472749.3474761
      - title: "Classroom-Level School Readiness in Ghanaian Preschools"
        content: Guo, S., & Wolf, S. (Conditional Acceptance). Early Education and Development.
      - title: "Random Intercepts and Slopes in Longitudinal Models"
        content: Guo, S., Hübner, N., et al. (Revise and Resubmit). Psychological Methods.
      - title: "Meta-Analysis: Exposure to Community Violence on Child Outcomes"
        content: Cristancho, J. C., Guo, S., et al. (Revise and Resubmit). Developmental Psychology.
      - title: "Effects of Learning Trajectory-Oriented Formative Assessment"
        content: Ebby, C. B., Diaz, K. G., et al. (2023). Working Paper, University of Pennsylvania.
        url: https://scholarcommons.uspenn.edu

  # projects
  projects:
    enable: false
    items: []

  #Contact
  contact:
    enable: true
    content: My inbox is always open. Whether you have a question or just want to say hi, I'll try my best to get back to you!
    btnName: Mail me
    btnLink: mailto:gusiling@uci.edu
    # formspree:
    #   enable: true # `contact.email` value will be ignored
    #   formId: abcdefgh # Take it from your form's endpoint, like 'https://formspree.io/f/abcdefgh'
    #   emailCaption: "Enter your email address"
    #   messageCaption: "Enter your message here"

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Posts
      enable: false
      disableFeaturedImage: false
    socialNetworks:
      googlescholar: https://scholar.google.com/citations?user=1JWqhlEAAAAJ&hl=en
      linkedin: https://www.linkedin.com/in/siling-guo

  # List pages like blogs and posts
  listPages:
    disableFeaturedImage: false

  # Single pages like blog and post
  singlePages:
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true

