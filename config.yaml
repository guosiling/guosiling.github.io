  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I am a Ph.D. candidate in the School of Education at the University of California, Irvine, specializing in Human Development in Context. My research examines how cognitive and social-emotional skills interact and develop across childhood and adolescence, with a particular focus on mathematics learning and educational interventions. I use longitudinal modeling, simulation methods, and randomized studies to understand developmental processes and evaluate how programs can support children's learning and well-being.
    skills:
      enable: true
      title: "Research Interests:"
      items:
        - "Child Development"
        - "Early Childhood Education"
        - "Mathematical Cognition"
        - "Math Motivation"
        - "Program Evaluation"
        - "Meta-Research"

